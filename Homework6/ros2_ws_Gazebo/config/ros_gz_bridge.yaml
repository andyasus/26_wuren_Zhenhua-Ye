# 传感器桥接（Gazebo -> ROS2）
- ros_topic_name: "/camera/image_raw"
  gz_topic_name: "/world/shixi_track/model/shixi_car/link/camera_link/sensor/camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/scan"
  gz_topic_name: "/world/shixi_track/model/shixi_car/link/lidar_link/sensor/lidar/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/gps/fix"
  gz_topic_name: "/world/shixi_track/model/shixi_car/link/gps_link/sensor/gps/gps"
  ros_type_name: "sensor_msgs/msg/NavSatFix"
  gz_type_name: "gz.msgs.NavSat"
  direction: GZ_TO_ROS

- ros_topic_name: "/imu/data"
  gz_topic_name: "/world/shixi_track/model/shixi_car/link/imu_link/sensor/imu/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/mag/data"
  gz_topic_name: "/world/shixi_track/model/shixi_car/link/magnetometer_link/sensor/magnetometer/magnetometer"
  ros_type_name: "sensor_msgs/msg/MagneticField"
  gz_type_name: "gz.msgs.Magnetometer"
  direction: GZ_TO_ROS

- ros_topic_name: "/odometry"
  gz_topic_name: "/model/shixi_car/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# 控制指令（ROS2 -> Gazebo）
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/shixi_car/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ